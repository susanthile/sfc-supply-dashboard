name: Refresh Supply Dashboard

on:
  schedule:
    - cron: '0 8,18 * * *'   # 8 AM and 6 PM UTC daily
  workflow_dispatch:            # Allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Lightfield data and regenerate dashboard
        env:
          LIGHTFIELD_API_KEY: ${{ secrets.LIGHTFIELD_API_KEY }}
        run: node generate.js

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "Refresh dashboard data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
